name: Weekly SEO Monitor + Ranking Engine

on:
  schedule:
    # Sunday 6:00 AM UTC — trends run before the week starts
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run full SEO ranking engine
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_TAB: ${{ secrets.GOOGLE_SHEETS_TAB }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_USER_ID: ${{ secrets.SLACK_ALERT_USER_ID }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: node monitor.js

      - name: Save trend data for daily pipeline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-data-${{ github.run_id }}
          path: runs/latest-trends.json
          retention-days: 10

      - name: Upload monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: runs/
          retention-days: 30
